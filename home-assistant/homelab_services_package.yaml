command_line:
  - binary_sensor:
      name: "Homelab Tailscale Subnet Router"
      unique_id: homelab_tailscale_subnet_router_status
      command: "ping -c 1 -W 2 192.168.1.198 >/dev/null 2>&1 && echo ON || echo OFF"
      scan_interval: 60
      command_timeout: 5
      payload_on: "ON"
      payload_off: "OFF"
      device_class: connectivity
