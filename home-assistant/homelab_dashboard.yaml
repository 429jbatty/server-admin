# Managed from /root/server-admin/home-assistant/homelab_dashboard.yaml

title: Homelab
views:
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    show_icon_and_title: true
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        title: Health
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: binary_sensor.homelab_home_assistant
                name: Home Assistant
                icon: mdi:home-assistant
                content_info: name
              - type: entity
                entity: binary_sensor.homelab_adguard_home
                name: AdGuard
                icon: mdi:shield-check
                content_info: name
              - type: entity
                entity: binary_sensor.homelab_jellyfin
                name: Jellyfin
                icon: mdi:play-box
                content_info: name
              - type: entity
                entity: binary_sensor.homelab_tailscale_subnet_router
                name: Tailscale
                icon: mdi:vpn
                content_info: name
              - type: entity
                entity: binary_sensor.albumary_public_site
                name: Albumary
                icon: mdi:web-check
                content_info: name
            alignment: start
          - type: custom:mushroom-entity-card
            entity: sensor.homelab_metrics_snapshot
            name: Homelab metrics
            icon: mdi:server-network
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.albumary_cloudflare_metrics_snapshot
            name: Cloudflare metrics
            icon: mdi:cloud-clock
            icon_color: cyan
          - type: custom:mushroom-template-card
            entity: sensor.albumary_cloudflare_last_error
            primary: Cloudflare errors
            secondary: "{{ states(entity) }}"
            icon: mdi:cloud-alert
            icon_color: "{{ 'green' if is_state(entity, 'none') else 'red' }}"

      - type: grid
        title: Current Load
        cards:
          - type: custom:mini-graph-card
            name: Proxmox CPU
            entities:
              - entity: sensor.homelab_proxmox_cpu
            hours_to_show: 12
            points_per_hour: 4
            line_width: 4
            show:
              fill: true
              icon: false
              legend: false
              extrema: false
            color_thresholds:
              - value: 0
                color: "#43a047"
              - value: 60
                color: "#f9a825"
              - value: 85
                color: "#e53935"
          - type: custom:mini-graph-card
            name: Proxmox RAM
            entities:
              - entity: sensor.homelab_proxmox_memory
            hours_to_show: 12
            points_per_hour: 4
            line_width: 4
            show:
              fill: true
              icon: false
              legend: false
              extrema: false
            color_thresholds:
              - value: 0
                color: "#43a047"
              - value: 70
                color: "#f9a825"
              - value: 90
                color: "#e53935"
          - type: custom:mini-graph-card
            name: Proxmox Disk
            entities:
              - entity: sensor.homelab_proxmox_disk
            hours_to_show: 12
            points_per_hour: 4
            line_width: 4
            show:
              fill: true
              icon: false
              legend: false
              extrema: false
            color_thresholds:
              - value: 0
                color: "#43a047"
              - value: 75
                color: "#f9a825"
              - value: 90
                color: "#e53935"

  - title: Services
    path: homelab
    icon: mdi:server-network
    show_icon_and_title: true
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        title: Core And Network
        cards:
          - type: custom:mushroom-template-card
            entity: binary_sensor.homelab_home_assistant
            primary: Home Assistant
            secondary: VM 100 - 192.168.1.187:8123
            icon: mdi:home-assistant
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
            tap_action:
              action: url
              url_path: http://192.168.1.187:8123
          - type: custom:mushroom-template-card
            entity: binary_sensor.homelab_adguard_home
            primary: AdGuard Home
            secondary: CT 102 - 192.168.1.189
            icon: mdi:shield-check
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
            tap_action:
              action: url
              url_path: http://192.168.1.189
          - type: custom:mushroom-template-card
            primary: Pause AdGuard
            secondary: Disable protection for 15 minutes
            icon: mdi:shield-pause
            icon_color: amber
            tap_action:
              action: call-service
              service: script.pause_adguard_15_min
              confirmation:
                text: Pause AdGuard protection for 15 minutes?

      - type: grid
        title: Watch And Request
        cards:
          - type: custom:mushroom-template-card
            entity: binary_sensor.homelab_jellyfin
            primary: Jellyfin
            secondary: CT 104 - 192.168.1.191:8096
            icon: mdi:play-box
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
            tap_action:
              action: url
              url_path: http://192.168.1.191:8096
          - type: custom:mushroom-template-card
            entity: binary_sensor.homelab_jellyseerr
            primary: Jellyseerr
            secondary: CT 106 - 192.168.1.197:5055
            icon: mdi:movie-search
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
            tap_action:
              action: url
              url_path: http://192.168.1.197:5055

      - type: grid
        title: Media Automation
        cards:
          - type: custom:mushroom-template-card
            entity: binary_sensor.homelab_radarr
            primary: Radarr
            secondary: CT 106 - 192.168.1.197:7878
            icon: mdi:movie-open
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
            tap_action:
              action: url
              url_path: http://192.168.1.197:7878
          - type: custom:mushroom-template-card
            entity: binary_sensor.homelab_sonarr
            primary: Sonarr
            secondary: CT 106 - 192.168.1.197:8989
            icon: mdi:television-classic
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
            tap_action:
              action: url
              url_path: http://192.168.1.197:8989
          - type: custom:mushroom-template-card
            entity: binary_sensor.homelab_prowlarr
            primary: Prowlarr
            secondary: CT 106 - 192.168.1.197:9696
            icon: mdi:radar
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
            tap_action:
              action: url
              url_path: http://192.168.1.197:9696
          - type: custom:mushroom-template-card
            entity: binary_sensor.homelab_bazarr
            primary: Bazarr
            secondary: CT 106 - 192.168.1.197:6767
            icon: mdi:subtitles
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
            tap_action:
              action: url
              url_path: http://192.168.1.197:6767

      - type: grid
        title: Downloads
        cards:
          - type: custom:mushroom-template-card
            entity: binary_sensor.homelab_qbittorrent
            primary: qBittorrent
            secondary: CT 106 - 192.168.1.197:8080
            icon: mdi:download-network
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
            tap_action:
              action: url
              url_path: http://192.168.1.197:8080

      - type: grid
        title: Remote Access
        cards:
          - type: custom:mushroom-template-card
            entity: binary_sensor.homelab_tailscale_subnet_router
            primary: Tailscale Subnet Router
            secondary: CT 107 - 192.168.1.198
            icon: mdi:vpn
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"

  - title: Albumary
    path: albumary
    icon: mdi:web
    show_icon_and_title: true
    type: sections
    max_columns: 2
    dense_section_placement: true
    sections:
      - type: grid
        title: Site Health
        cards:
          - type: custom:mushroom-template-card
            entity: binary_sensor.albumary_public_site
            primary: app.albumary.net
            secondary: Public Cloudflare route
            icon: mdi:web-check
            icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
            tap_action:
              action: url
              url_path: https://app.albumary.net
          - type: custom:mushroom-entity-card
            entity: sensor.albumary_cloudflare_metrics_snapshot
            name: Last Cloudflare poll
            icon: mdi:cloud-clock
            icon_color: cyan
          - type: custom:mushroom-template-card
            entity: sensor.albumary_cloudflare_last_error
            primary: Last Cloudflare error
            secondary: "{{ states(entity) }}"
            icon: mdi:cloud-alert
            icon_color: "{{ 'green' if is_state(entity, 'none') else 'red' }}"

      - type: grid
        title: Last 24 Hours
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.albumary_cloudflare_page_views_24h
            name: Page views
            icon: mdi:file-eye
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.albumary_cloudflare_visitors_24h
            name: Visitors
            icon: mdi:account-eye
            icon_color: indigo
          - type: custom:mushroom-entity-card
            entity: sensor.albumary_cloudflare_requests_24h
            name: Requests
            icon: mdi:web
            icon_color: cyan
          - type: custom:mushroom-entity-card
            entity: sensor.albumary_cloudflare_transfer_24h
            name: Transfer
            icon: mdi:download-network-outline
            icon_color: teal
          - type: custom:mushroom-entity-card
            entity: sensor.albumary_cloudflare_4xx_24h
            name: 4xx responses
            icon: mdi:alert-circle-outline
            icon_color: amber
          - type: custom:mushroom-entity-card
            entity: sensor.albumary_cloudflare_5xx_24h
            name: 5xx responses
            icon: mdi:server-off
            icon_color: red

      - type: grid
        title: Trends
        cards:
          - type: custom:mini-graph-card
            name: Traffic
            hours_to_show: 24
            points_per_hour: 4
            line_width: 4
            entities:
              - entity: sensor.albumary_cloudflare_requests_24h
                name: Requests
                color: "#1e88e5"
              - entity: sensor.albumary_cloudflare_page_views_24h
                name: Page views
                color: "#00897b"
              - entity: sensor.albumary_cloudflare_visitors_24h
                name: Visitors
                color: "#5e35b1"
            show:
              fill: fade
              icon: false
              legend: false
              extrema: false
          - type: custom:mini-graph-card
            name: Errors
            hours_to_show: 24
            points_per_hour: 4
            line_width: 4
            entities:
              - entity: sensor.albumary_cloudflare_4xx_24h
                name: 4xx
                color: "#f9a825"
              - entity: sensor.albumary_cloudflare_5xx_24h
                name: 5xx
                color: "#e53935"
            show:
              fill: fade
              icon: false
              legend: false
              extrema: false

      - type: grid
        title: Top Paths
        cards:
          - type: markdown
            content: |
              {% set paths = state_attr('sensor.albumary_cloudflare_metrics_snapshot', 'top_paths') or [] %}
              {% set web = state_attr('sensor.albumary_cloudflare_metrics_snapshot', 'web_analytics') or {} %}
              {% set web_paths = web.top_paths | default([]) %}
              **Top paths**

              {% if web_paths %}
                {% for path in web_paths %}
              `{{ path.path }}` - {{ path.page_views }} page views, {{ path.visitors }} visitors
                {% endfor %}
              {% else %}
                {% for path in paths %}
              `{{ path.path }}` - {{ path.requests }} HTTP requests
                {% else %}
              No path data from Cloudflare yet.
                {% endfor %}
              {% endif %}

      - type: grid
        title: Recent Hours
        cards:
          - type: markdown
            content: |
              {% set web = state_attr('sensor.albumary_cloudflare_metrics_snapshot', 'web_analytics') or {} %}
              {% set hourly = web.hourly | default([]) %}
              {% for row in hourly[:6] %}
              {{ row.datetime_hour }} - {{ row.page_views }} page views, {{ row.visitors }} visitors
              {% else %}
              No hourly data from Cloudflare yet.
              {% endfor %}

