# Managed from /root/server-admin/home-assistant/homelab_dashboard.yaml

title: Homelab
views:
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    type: sections
    sections:
      - type: grid
        title: Health
        cards:
          - type: entities
            title: Core Services
            show_header_toggle: false
            entities:
              - entity: binary_sensor.homelab_home_assistant
                name: Home Assistant
                icon: mdi:home-assistant
              - entity: binary_sensor.homelab_adguard_home
                name: AdGuard Home
                icon: mdi:shield-check
              - entity: binary_sensor.homelab_jellyfin
                name: Jellyfin
                icon: mdi:play-box
              - entity: binary_sensor.homelab_tailscale_subnet_router
                name: Tailscale Router
                icon: mdi:vpn
              - entity: binary_sensor.albumary_public_site
                name: app.albumary.net
                icon: mdi:web-check
          - type: entities
            title: Data Sources
            show_header_toggle: false
            entities:
              - entity: sensor.homelab_metrics_snapshot
                name: Homelab metrics poll
                icon: mdi:server-network
              - entity: sensor.albumary_cloudflare_metrics_snapshot
                name: Cloudflare metrics poll
                icon: mdi:cloud-clock
              - entity: sensor.albumary_cloudflare_last_error
                name: Cloudflare last error
                icon: mdi:cloud-alert

      - type: grid
        title: Current Load
        cards:
          - type: gauge
            entity: sensor.homelab_proxmox_cpu
            name: Proxmox CPU
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.homelab_proxmox_memory
            name: Proxmox RAM
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.homelab_home_assistant_cpu
            name: HA CPU
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.homelab_media_stack_cpu
            name: Media CPU
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85

      - type: grid
        title: Albumary
        cards:
          - type: tile
            entity: sensor.albumary_cloudflare_visits_24h
            name: Visits
            icon: mdi:account-eye
          - type: tile
            entity: sensor.albumary_cloudflare_requests_24h
            name: Requests
            icon: mdi:web
          - type: tile
            entity: sensor.albumary_cloudflare_4xx_24h
            name: 4xx
            icon: mdi:alert-circle-outline
          - type: tile
            entity: sensor.albumary_cloudflare_5xx_24h
            name: 5xx
            icon: mdi:server-off

  - title: Services
    path: homelab
    icon: mdi:server-network
    type: sections
    sections:
      - type: grid
        title: Home And Network
        cards:
          - type: tile
            entity: binary_sensor.homelab_home_assistant
            name: Home Assistant
            icon: mdi:home-assistant
            tap_action:
              action: url
              url_path: http://192.168.1.187:8123
          - type: tile
            entity: binary_sensor.homelab_adguard_home
            name: AdGuard Home
            icon: mdi:shield-check
            tap_action:
              action: url
              url_path: http://192.168.1.189

      - type: grid
        title: Media Services
        cards:
          - type: tile
            entity: binary_sensor.homelab_jellyfin
            name: Jellyfin
            icon: mdi:play-box
            tap_action:
              action: url
              url_path: http://192.168.1.191:8096
          - type: tile
            entity: binary_sensor.homelab_jellyseerr
            name: Jellyseerr
            icon: mdi:movie-search
            tap_action:
              action: url
              url_path: http://192.168.1.197:5055
          - type: tile
            entity: binary_sensor.homelab_radarr
            name: Radarr
            icon: mdi:movie-open
            tap_action:
              action: url
              url_path: http://192.168.1.197:7878
          - type: tile
            entity: binary_sensor.homelab_sonarr
            name: Sonarr
            icon: mdi:television-classic
            tap_action:
              action: url
              url_path: http://192.168.1.197:8989
          - type: tile
            entity: binary_sensor.homelab_prowlarr
            name: Prowlarr
            icon: mdi:radar
            tap_action:
              action: url
              url_path: http://192.168.1.197:9696
          - type: tile
            entity: binary_sensor.homelab_qbittorrent
            name: qBittorrent
            icon: mdi:download-network
            tap_action:
              action: url
              url_path: http://192.168.1.197:8080
          - type: tile
            entity: binary_sensor.homelab_bazarr
            name: Bazarr
            icon: mdi:subtitles
            tap_action:
              action: url
              url_path: http://192.168.1.197:6767

      - type: grid
        title: Remote Access
        cards:
          - type: tile
            entity: binary_sensor.homelab_tailscale_subnet_router
            name: Tailscale Subnet Router
            icon: mdi:vpn

      - type: grid
        title: Public Sites
        cards:
          - type: tile
            entity: binary_sensor.albumary_public_site
            name: app.albumary.net
            icon: mdi:web-check
            tap_action:
              action: url
              url_path: https://app.albumary.net

  - title: Albumary
    path: albumary
    icon: mdi:web
    type: sections
    sections:
      - type: grid
        title: Site Health
        cards:
          - type: tile
            entity: binary_sensor.albumary_public_site
            name: app.albumary.net
            icon: mdi:web-check
            tap_action:
              action: url
              url_path: https://app.albumary.net
          - type: entities
            title: Cloudflare Snapshot
            show_header_toggle: false
            entities:
              - entity: sensor.albumary_cloudflare_metrics_snapshot
                name: Last poll
                icon: mdi:cloud-clock
              - entity: sensor.albumary_cloudflare_last_error
                name: Last error
                icon: mdi:cloud-alert

      - type: grid
        title: Last 24 Hours
        cards:
          - type: tile
            entity: sensor.albumary_cloudflare_requests_24h
            name: Requests
            icon: mdi:web
          - type: tile
            entity: sensor.albumary_cloudflare_visits_24h
            name: Visits
            icon: mdi:account-eye
          - type: tile
            entity: sensor.albumary_cloudflare_transfer_24h
            name: Transfer
            icon: mdi:download-network-outline
          - type: entities
            title: Response Errors
            show_header_toggle: false
            entities:
              - entity: sensor.albumary_cloudflare_4xx_24h
                name: 4xx responses
              - entity: sensor.albumary_cloudflare_5xx_24h
                name: 5xx responses

      - type: grid
        title: Trends
        cards:
          - type: history-graph
            title: Traffic
            hours_to_show: 24
            entities:
              - sensor.albumary_cloudflare_requests_24h
              - sensor.albumary_cloudflare_visits_24h
              - sensor.albumary_cloudflare_transfer_24h
          - type: history-graph
            title: Errors
            hours_to_show: 24
            entities:
              - sensor.albumary_cloudflare_4xx_24h
              - sensor.albumary_cloudflare_5xx_24h

      - type: grid
        title: Cloudflare Details
        cards:
          - type: markdown
            content: |
              {% set paths = state_attr('sensor.albumary_cloudflare_metrics_snapshot', 'top_paths') or [] %}
              **Top paths**

              {% for path in paths %}
              `{{ path.path }}` - {{ path.requests }} requests
              {% else %}
              No path data from Cloudflare yet.
              {% endfor %}
          - type: markdown
            content: |
              {% set hourly = state_attr('sensor.albumary_cloudflare_metrics_snapshot', 'hourly') or [] %}
              **Recent hourly requests**

              {% for row in hourly[:6] %}
              {{ row.datetime_hour }} - {{ row.requests }} requests
              {% else %}
              No hourly data from Cloudflare yet.
              {% endfor %}

  - title: Metrics
    path: homelab-metrics
    icon: mdi:chart-line
    type: sections
    sections:
      - type: grid
        title: Proxmox Host
        cards:
          - type: gauge
            entity: sensor.homelab_proxmox_cpu
            name: CPU
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.homelab_proxmox_memory
            name: RAM
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.homelab_proxmox_disk
            name: Disk
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 75
              red: 90
          - type: history-graph
            title: Proxmox Trends
            hours_to_show: 24
            entities:
              - sensor.homelab_proxmox_cpu
              - sensor.homelab_proxmox_memory
              - sensor.homelab_proxmox_disk

      - type: grid
        title: Guest Systems
        cards:
          - type: entities
            title: Current Guest Load
            show_header_toggle: false
            entities:
              - entity: sensor.homelab_home_assistant_cpu
                name: Home Assistant CPU
              - entity: sensor.homelab_home_assistant_memory
                name: Home Assistant RAM
              - entity: sensor.homelab_jellyfin_cpu
                name: Jellyfin CPU
              - entity: sensor.homelab_media_stack_cpu
                name: Media Stack CPU
              - entity: sensor.homelab_remote_access_cpu
                name: Tailscale CPU
          - type: history-graph
            title: Home Assistant
            hours_to_show: 24
            entities:
              - sensor.homelab_home_assistant_cpu
              - sensor.homelab_home_assistant_memory
              - sensor.homelab_home_assistant_disk
          - type: history-graph
            title: Jellyfin
            hours_to_show: 24
            entities:
              - sensor.homelab_jellyfin_cpu
              - sensor.homelab_jellyfin_memory
              - sensor.homelab_jellyfin_disk
          - type: history-graph
            title: Media Stack
            hours_to_show: 24
            entities:
              - sensor.homelab_media_stack_cpu
              - sensor.homelab_media_stack_memory
              - sensor.homelab_media_stack_disk

      - type: grid
        title: Remote And Source
        cards:
          - type: history-graph
            title: Tailscale Router
            hours_to_show: 24
            entities:
              - sensor.homelab_remote_access_cpu
              - sensor.homelab_remote_access_memory
          - type: entities
            title: Metrics Source
            entities:
              - entity: sensor.homelab_metrics_snapshot
                name: Last metrics poll

      - type: grid
        title: Media Containers
        cards:
          - type: entities
            title: Current Container Load
            show_header_toggle: false
            entities:
              - entity: sensor.homelab_jellyseerr_container_cpu
                name: Jellyseerr CPU
              - entity: sensor.homelab_radarr_container_cpu
                name: Radarr CPU
              - entity: sensor.homelab_sonarr_container_cpu
                name: Sonarr CPU
              - entity: sensor.homelab_prowlarr_container_cpu
                name: Prowlarr CPU
              - entity: sensor.homelab_qbittorrent_container_cpu
                name: qBittorrent CPU
              - entity: sensor.homelab_bazarr_container_cpu
                name: Bazarr CPU
          - type: history-graph
            title: Container CPU
            hours_to_show: 24
            entities:
              - sensor.homelab_jellyseerr_container_cpu
              - sensor.homelab_radarr_container_cpu
              - sensor.homelab_sonarr_container_cpu
              - sensor.homelab_prowlarr_container_cpu
              - sensor.homelab_qbittorrent_container_cpu
              - sensor.homelab_bazarr_container_cpu
          - type: history-graph
            title: Container RAM
            hours_to_show: 24
            entities:
              - sensor.homelab_jellyseerr_container_memory
              - sensor.homelab_radarr_container_memory
              - sensor.homelab_sonarr_container_memory
              - sensor.homelab_prowlarr_container_memory
              - sensor.homelab_qbittorrent_container_memory
              - sensor.homelab_bazarr_container_memory
