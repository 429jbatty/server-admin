command_line:
  - binary_sensor:
      name: "Homelab Tailscale Subnet Router"
      unique_id: homelab_tailscale_subnet_router_status
      command: "ping -c 1 -W 2 192.168.1.198 >/dev/null 2>&1 && echo ON || echo OFF"
      scan_interval: 60
      command_timeout: 5
      payload_on: "ON"
      payload_off: "OFF"
      device_class: connectivity

  - sensor:
      name: "Albumary Cloudflare Metrics Snapshot"
      unique_id: albumary_cloudflare_metrics_snapshot
      command: "python3 /config/scripts/cloudflare_albumary_metrics.py"
      scan_interval: 300
      command_timeout: 30
      value_template: "{{ value_json.updated_at | default('unknown') }}"
      json_attributes:
        - ok
        - error
        - hostname
        - window_hours
        - totals
        - web_analytics
        - hourly
        - top_paths

sensor:
  - platform: rest
    name: "Homelab Metrics Snapshot"
    unique_id: homelab_metrics_snapshot
    resource: "http://192.168.1.184:9108/metrics/homelab"
    method: GET
    timeout: 10
    scan_interval: 60
    value_template: "{{ value_json.updated_at | default(0) }}"
    json_attributes:
      - ok
      - node
      - guests
      - containers
      - errors

template:
  - sensor:
      - name: "Homelab Proxmox CPU"
        unique_id: homelab_proxmox_cpu_percent
        unit_of_measurement: "%"
        state_class: measurement
        state: "{{ state_attr('sensor.homelab_metrics_snapshot', 'node').cpu_percent | default('unknown') }}"

      - name: "Homelab Proxmox Memory"
        unique_id: homelab_proxmox_memory_percent
        unit_of_measurement: "%"
        state_class: measurement
        state: "{{ state_attr('sensor.homelab_metrics_snapshot', 'node').memory_percent | default('unknown') }}"

      - name: "Homelab Proxmox Disk"
