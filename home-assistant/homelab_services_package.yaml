# Managed from /root/server-admin/home-assistant/homelab_services_package.yaml
# Provides LAN service reachability sensors and Proxmox resource metrics.

rest_command:
  adguard_pause_15_min:
    url: "http://192.168.1.189/control/protection"
    method: POST
    headers:
      Authorization: !secret adguard_auth_header
      Content-Type: "application/json"
    payload: '{"enabled": false, "duration": 900000}'
    content_type: "application/json"

script:
  pause_adguard_15_min:
    alias: "Pause AdGuard for 15 minutes"
    mode: single
    sequence:
      - service: rest_command.adguard_pause_15_min
      - service: persistent_notification.create
        data:
          title: "AdGuard paused"
          message: "AdGuard protection has been paused for 15 minutes."

