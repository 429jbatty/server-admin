# Managed from /root/server-admin/home-assistant/homelab_dashboard.yaml

title: Homelab
views:
  - title: Services
    path: homelab
    icon: mdi:server-network
    type: sections
    sections:
      - type: grid
        title: At A Glance
        cards:
          - type: entities
            title: Core Health
            show_header_toggle: false
            entities:
              - entity: binary_sensor.homelab_home_assistant
                name: Home Assistant
                icon: mdi:home-assistant
              - entity: binary_sensor.homelab_adguard_home
                name: AdGuard Home
                icon: mdi:shield-check
              - entity: binary_sensor.homelab_jellyfin
                name: Jellyfin
                icon: mdi:play-box
              - entity: binary_sensor.homelab_tailscale_subnet_router
                name: Tailscale Router
                icon: mdi:vpn
          - type: entities
            title: Current Load
            show_header_toggle: false
            entities:
              - entity: sensor.homelab_proxmox_cpu
                name: Proxmox CPU
                icon: mdi:chip
              - entity: sensor.homelab_proxmox_memory
                name: Proxmox RAM
                icon: mdi:memory
              - entity: sensor.homelab_home_assistant_cpu
                name: Home Assistant CPU
                icon: mdi:home-assistant
              - entity: sensor.homelab_media_stack_cpu
                name: Media Stack CPU
                icon: mdi:server

      - type: grid
        title: Home And Network
        cards:
          - type: tile
            entity: binary_sensor.homelab_home_assistant
            name: Home Assistant
            icon: mdi:home-assistant
            tap_action:
              action: url
              url_path: http://192.168.1.187:8123
          - type: markdown
            content: |
              **Home and network**

              Home Assistant runs in VM 100 at `192.168.1.187:8123`.

              AdGuard Home runs in CT 102 at `192.168.1.189`.
          - type: tile
            entity: binary_sensor.homelab_adguard_home
            name: AdGuard Home
            icon: mdi:shield-check
            tap_action:
              action: url
              url_path: http://192.168.1.189

      - type: grid
        title: Media Services
        cards:
          - type: tile
            entity: binary_sensor.homelab_jellyfin
            name: Jellyfin
            icon: mdi:play-box
            tap_action:
              action: url
              url_path: http://192.168.1.191:8096
          - type: tile
