      - type: grid
        title: Resource Health
        cards:
          - type: gauge
            entity: sensor.homelab_proxmox_cpu
            name: Proxmox CPU
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.homelab_proxmox_memory
            name: Proxmox RAM
            min: 0
            max: 100
