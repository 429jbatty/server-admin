# Managed from /root/server-admin/home-assistant/washer_package.yaml
# Tracks the washer cycle from a Home Assistant NFC tag scan.

input_datetime:
  washer_started:
    name: Washer Started
    has_date: true
    has_time: true

input_boolean:
  washer_running:
    name: Washer Running
    icon: mdi:washing-machine

input_button:
  washer_start:
    name: Start Washer Timer
    icon: mdi:play-circle
  washer_clear:
    name: Clear Washer Timer
    icon: mdi:close-circle

template:
  - sensor:
      - name: "Washer Hours Since Started"
        unique_id: washer_hours_since_started
        unit_of_measurement: "h"
        icon: mdi:timer-outline
        availability: >-
          {{ states('input_datetime.washer_started') not in ['unknown', 'unavailable', 'none', ''] }}
        state: >-
          {% set started = states('input_datetime.washer_started') %}
          {% if is_state('input_boolean.washer_running', 'off') %}
            0
          {% elif started in ['unknown', 'unavailable', 'none', ''] %}
            unknown
          {% else %}
            {{ ((now() - as_local(started | as_datetime)).total_seconds() / 3600) | round(1) }}
          {% endif %}

  - binary_sensor:
      - name: "Washer Overdue"
        unique_id: washer_overdue
        device_class: problem
        icon: mdi:alert-circle
        state: >-
          {% set started = states('input_datetime.washer_started') %}
          {% if is_state('input_boolean.washer_running', 'off') or started in ['unknown', 'unavailable', 'none', ''] %}
            false
          {% else %}
            {{ (now() - as_local(started | as_datetime)).total_seconds() >= 1 * 3600 }}
          {% endif %}

automation:
  - alias: "Washer NFC Tag Scanned"
    id: washer_nfc_tag_scanned
    description: "Start or restart the washer timer when the Washer NFC tag is scanned."
    trigger:
      - platform: tag
        tag_id: 2a6e85f6-59d4-459b-a23d-16b20ac3992a
    condition: []
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.washer_started
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.washer_running
    mode: single

  - alias: "Washer Manual Start"
    id: washer_manual_start
    description: "Start or restart the washer timer from the Chores dashboard fallback button."
    trigger:
      - platform: state
        entity_id: input_button.washer_start
    condition: []
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.washer_started
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.washer_running
    mode: single

  - alias: "Washer Clear Timer"
    id: washer_clear_timer
    description: "Stop the washer timer and suppress further reminders until the next scan or manual start."
    trigger:
      - platform: state
        entity_id: input_button.washer_clear
    condition: []
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.washer_running
    mode: single

  - alias: "Washer 1 Hour Reminder"
    id: washer_1_hour_reminder
    description: "Notify when the washer timer reaches 1 hour."
    trigger:
      - platform: template
        value_template: >-
          {% set started = states('input_datetime.washer_started') %}
          {{ is_state('input_boolean.washer_running', 'on')
             and started not in ['unknown', 'unavailable', 'none', '']
             and (now() - as_local(started | as_datetime)).total_seconds() >= 1 * 3600 }}
    condition: []
    action:
      - service: notify.mobile_app_pixel
        data:
          title: "Washer ready"
          message: "The washer has been running for 1 hour."
          data:
            tag: washer-reminder
            channel: Washer
            importance: high
    mode: single

  - alias: "Washer 2 Hour Reminder"
    id: washer_2_hour_reminder
    description: "Notify when the washer timer reaches 2 hours."
    trigger:
      - platform: template
        value_template: >-
          {% set started = states('input_datetime.washer_started') %}
          {{ is_state('input_boolean.washer_running', 'on')
             and started not in ['unknown', 'unavailable', 'none', '']
             and (now() - as_local(started | as_datetime)).total_seconds() >= 2 * 3600 }}
    condition: []
    action:
      - service: notify.mobile_app_pixel
        data:
          title: "Washer still waiting"
          message: "The washer has been waiting for 2 hours."
          data:
            tag: washer-reminder
            channel: Washer
            importance: high
    mode: single

  - alias: "Washer 24 Hour Reminder"
    id: washer_24_hour_reminder
    description: "Notify when the washer timer reaches 24 hours."
    trigger:
      - platform: template
        value_template: >-
          {% set started = states('input_datetime.washer_started') %}
          {{ is_state('input_boolean.washer_running', 'on')
             and started not in ['unknown', 'unavailable', 'none', '']
             and (now() - as_local(started | as_datetime)).total_seconds() >= 24 * 3600 }}
    condition: []
    action:
      - service: notify.mobile_app_pixel
        data:
          title: "Washer needs attention"
          message: "The washer has been waiting for 24 hours."
          data:
            tag: washer-reminder
            channel: Washer
            importance: high
    mode: single
