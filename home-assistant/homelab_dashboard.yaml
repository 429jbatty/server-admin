              - entity: sensor.homelab_radarr_container_cpu
                name: Radarr CPU
              - entity: sensor.homelab_sonarr_container_cpu
                name: Sonarr CPU
              - entity: sensor.homelab_prowlarr_container_cpu
                name: Prowlarr CPU
              - entity: sensor.homelab_qbittorrent_container_cpu
                name: qBittorrent CPU
              - entity: sensor.homelab_bazarr_container_cpu
                name: Bazarr CPU
          - type: history-graph
            title: Container CPU
            hours_to_show: 24
            entities:
              - sensor.homelab_jellyseerr_container_cpu
              - sensor.homelab_radarr_container_cpu
              - sensor.homelab_sonarr_container_cpu
              - sensor.homelab_prowlarr_container_cpu
              - sensor.homelab_qbittorrent_container_cpu
              - sensor.homelab_bazarr_container_cpu
          - type: history-graph
            title: Container RAM
