services:
  # VPN namespace for torrent-facing services.
  #
  # Gluetun owns the VPN tunnel and Docker publishes qBittorrent's Web UI and
  # Prowlarr's UI through this container. qBittorrent and Prowlarr use
  # network_mode: service:gluetun below, so they have no standalone Docker
  # network interface or non-VPN internet egress path. Radarr, Sonarr,
  # Jellyseerr, Bazarr, and Jellyfin stay on normal networking.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - path: /opt/media-stack/vpn.env
        required: true
    environment:
      TZ: America/Chicago
    ports:
      # LAN Web UIs for services sharing Gluetun's network namespace. Do not
      # publish torrent listen ports on the LAN; Proton NAT-PMP exposes the
      # forwarded torrent port through the VPN.
      - "8080:8080"
      - "9696:9696"
    volumes:
      - /data/config/gluetun:/gluetun
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      LOG_LEVEL: info
      TZ: America/Chicago
    ports:
      - "5055:5055"
    volumes:
      - /data/config/jellyseerr:/app/config
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      PUID: 65534
      PGID: 65534
      TZ: America/Chicago
    ports:
      - "7878:7878"
    volumes:
      - /data/config/radarr:/config
      - /data:/data
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      PUID: 65534
      PGID: 65534
      TZ: America/Chicago
    ports:
      - "8989:8989"
    volumes:
      - /data/config/sonarr:/config
      - /data:/data
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    depends_on:
      gluetun:
        condition: service_healthy
    network_mode: "service:gluetun"
    environment:
      PUID: 65534
      PGID: 65534
      TZ: America/Chicago
      DOTNET_SYSTEM_NET_HTTP_SOCKETSHTTPHANDLER_HTTP2SUPPORT: "false"
    volumes:
      - /data/config/prowlarr:/config
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    depends_on:
      gluetun:
        condition: service_healthy
    network_mode: "service:gluetun"
    environment:
      PUID: 65534
      PGID: 65534
      TZ: America/Chicago
      WEBUI_PORT: 8080
    volumes:
      - /data/config/qbittorrent:/config
      - /data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080 >/dev/null || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 2m

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      PUID: 65534
      PGID: 65534
      TZ: America/Chicago
    ports:
      - "6767:6767"
    volumes:
      - /data/config/bazarr:/config
      - /data:/data
    restart: unless-stopped

  filebrowser:
    image: gtstef/filebrowser:stable
    container_name: filebrowser
    env_file:
      - path: /opt/media-stack/filebrowser.env
        required: true
    environment:
      TZ: America/Chicago
      FILEBROWSER_CONFIG: /home/filebrowser/data/config.yaml
      FILEBROWSER_DATABASE: /home/filebrowser/data/database.db
    ports:
      - "8090:8080"
    volumes:
      - /data/config/filebrowser:/home/filebrowser/data
      - /data/library:/sources/media-library
      - /backups/guest-dumps:/sources/proxmox-guest-backups:ro
      - /backups/media-library-current:/sources/media-library-backup:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
